services:
  # Django Web Server
  - type: web
    name: playto-backend
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "playto-backend.onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://playto-payout.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: playto-redis
          type: redis
          property: connectionString

  # Celery Worker
  - type: worker
    name: playto-celery-worker
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config worker --loglevel=info"
    envVars:
      - key: SECRET_KEY
        fromService:
          name: playto-backend
          type: web
          envVarKey: SECRET_KEY
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: playto-redis
          type: redis
          property: connectionString

  # Celery Beat Scheduler
  - type: worker
    name: playto-celery-beat
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config beat --loglevel=info"
    envVars:
      - key: SECRET_KEY
        fromService:
          name: playto-backend
          type: web
          envVarKey: SECRET_KEY
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: playto-redis
          type: redis
          property: connectionString

databases:
  - name: playto-db
    databaseName: playto_payout
    plan: free

  - name: playto-redis
    plan: free